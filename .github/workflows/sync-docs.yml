name: Sync Gitlab NOMAD-FAIR Docs

on:
  workflow_dispatch:

jobs:
  sync-docs:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout GitHub repo
      uses: actions/checkout@v4

    - name: Clone only the 'docs' folder from GitLab (develop branch)
      run: |
        GITLAB_REPO="https://gitlab.mpcdf.mpg.de/nomad-lab/nomad-FAIR.git"

        # Clone repo shallowly with sparse checkout
        git clone --filter=blob:none --no-checkout --branch develop "$GITLAB_REPO" temp-docs
        cd temp-docs
        git sparse-checkout init --cone
        git sparse-checkout set docs
        git checkout

        # Move 'docs' to GitHub workspace
        rm -rf ../docs
        mv docs ../docs

    - name: Commit and push updated docs
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add docs/
        git commit -m "Sync docs from nomad-FAIR GitLab (develop branch)" || echo "No changes to commit"
        git push origin synced-docs
